[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.ruff]
exclude = ["venv", "static/lib"]

[tool.ruff.lint]
# E402: load_dotenv() before imports is intentional in several modules
# E701/E702: single-line compound statements are widespread and stylistic
ignore = ["E402", "E701", "E702"]
